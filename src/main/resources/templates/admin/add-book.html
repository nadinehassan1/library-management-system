<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card-header { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px 20px 0 0 !important; padding: 2rem; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; padding: 12px; }
        .form-control { border-radius: 10px; padding: 12px; border: 2px solid #e9ecef; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center text-white">
                    <i class="bi bi-book-fill" style="font-size: 3rem;"></i>
                    <h3 class="mt-2 mb-0 fw-bold">Add New Book</h3>
                    <p class="mb-0 opacity-75">Fill in the book details below</p>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/books/add}" method="post" th:object="${book}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Book Title</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-book"></i></span>
                                <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. The Great Gatsby"/>
                            </div>
                            <span class="text-danger small" th:errors="*{title}"></span>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Author</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-lines-fill"></i></span>
                                <input type="text" th:field="*{author}" class="form-control" placeholder="e.g. F. Scott Fitzgerald"/>
                            </div>
                            <span class="text-danger small" th:errors="*{author}"></span>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">ISBN</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
                                <input type="text" th:field="*{isbn}" class="form-control" placeholder="e.g. 978-3-16-148410-0"/>
                            </div>
                            <span class="text-danger small" th:errors="*{isbn}"></span>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Number of Copies</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-stack"></i></span>
                                <input type="number" th:field="*{totalCopies}" class="form-control" placeholder="e.g. 5" min="1"/>
                            </div>
                            <span class="text-danger small" th:errors="*{totalCopies}"></span>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-semibold text-white">
                            <i class="bi bi-plus-circle me-2"></i>Add Book
                        </button>
                    </form>
                    <hr class="my-3"/>
                    <a href="/admin/home" class="btn btn-outline-secondary w-100 rounded-pill">
                        <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
