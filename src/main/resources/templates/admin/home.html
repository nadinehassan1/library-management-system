<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #f4f6fb; }
        .navbar { background: linear-gradient(135deg, #2c3e50, #3498db) !important; }
        .stat-card { border: none; border-radius: 15px; padding: 1.5rem; color: white; }
        .stat-card-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card-2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .stat-card-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .stat-card h2 { font-size: 2.5rem; font-weight: 700; margin: 0; }
        .card { border: none; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .table th { background: #2c3e50; color: white; border: none; padding: 14px; }
        .table td { padding: 12px 14px; vertical-align: middle; }
        .table tbody tr:hover { background: #f8f9ff; }
        .btn-add { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; color: white; padding: 10px 20px; }
        .btn-add:hover { color: white; transform: translateY(-1px); }
        .badge-borrowed { background: #fff3cd; color: #856404; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .badge-returned { background: #d1e7dd; color: #0f5132; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .section-title { font-weight: 700; color: #2c3e50; margin-bottom: 1rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark px-4 py-3 mb-4">
    <span class="navbar-brand fw-bold fs-5"><i class="bi bi-book-half me-2"></i>Library Admin</span>
    <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white opacity-75"><i class="bi bi-person-circle me-1"></i>Administrator</span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm rounded-pill px-3">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="stat-card stat-card-1">
                <p class="mb-1 opacity-75"><i class="bi bi-journal-bookmark me-2"></i>Total Books</p>
                <h2 th:text="${books.size()}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card stat-card-2">
                <p class="mb-1 opacity-75"><i class="bi bi-people me-2"></i>Registered Users</p>
                <h2 th:text="${users.size()}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card stat-card-3">
                <p class="mb-1 opacity-75"><i class="bi bi-arrow-left-right me-2"></i>Total Borrows</p>
                <h2 th:text="${records.size()}">0</h2>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="section-title mb-0"><i class="bi bi-journal-bookmark me-2"></i>Books</h5>
                <a href="/admin/books/add" class="btn btn-add"><i class="bi bi-plus-lg me-2"></i>Add New Book</a>
            </div>
            <div class="table-responsive">
                <table class="table table-hover rounded-3 overflow-hidden">
                    <thead>
                    <tr><th>Title</th><th>Author</th><th>ISBN</th><th>Total</th><th>Available</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="book : ${books}">
                        <td class="fw-semibold" th:text="${book.title}"></td>
                        <td th:text="${book.author}"></td>
                        <td><span class="text-muted" th:text="${book.isbn}"></span></td>
                        <td th:text="${book.totalCopies}"></td>
                        <td>
                                <span th:class="${book.availableCopies > 0} ? 'badge-returned' : 'badge-borrowed'"
                                      th:text="${book.availableCopies}"></span>
                        </td>
                        <td>
                            <a th:href="@{/admin/books/delete/{id}(id=${book.id})}"
                               class="btn btn-danger btn-sm rounded-pill"
                               onclick="return confirm('Delete this book?')">
                                <i class="bi bi-trash"></i> Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h5 class="section-title"><i class="bi bi-clock-history me-2"></i>Borrow History</h5>
            <div class="table-responsive">
                <table class="table table-hover rounded-3 overflow-hidden">
                    <thead>
                    <tr><th>User</th><th>Book</th><th>Borrow Date</th><th>Return Date</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="record : ${records}">
                        <td class="fw-semibold" th:text="${record.user.name}"></td>
                        <td th:text="${record.book.title}"></td>
                        <td th:text="${record.borrowDate}"></td>
                        <td th:text="${record.returnDate != null ? record.returnDate : '-'}"></td>
                        <td>
                                <span th:class="${record.status == 'BORROWED'} ? 'badge-borrowed' : 'badge-returned'"
                                      th:text="${record.status}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
