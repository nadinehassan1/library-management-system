<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Member Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #f4f6fb; }
        .navbar { background: linear-gradient(135deg, #11998e, #38ef7d) !important; }
        .navbar .btn-outline-light:hover { background: white; color: #11998e; }
        .card { border: none; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .table th { background: #11998e; color: white; border: none; padding: 14px; }
        .table td { padding: 12px 14px; vertical-align: middle; }
        .table tbody tr:hover { background: #f0fff8; }
        .badge-borrowed { background: #fff3cd; color: #856404; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-returned { background: #d1e7dd; color: #0f5132; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .book-card { border: none; border-radius: 15px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .book-card:hover { transform: translateY(-5px); }
        .book-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .welcome-banner { background: linear-gradient(135deg, #11998e, #38ef7d); border-radius: 15px; padding: 2rem; color: white; margin-bottom: 2rem; }
        .section-title { font-weight: 700; color: #2c3e50; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark px-4 py-3 mb-4">
    <span class="navbar-brand fw-bold fs-5"><i class="bi bi-book-half me-2"></i>Library</span>
    <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white opacity-75"><i class="bi bi-person-circle me-1"></i><span th:text="${user.name}">User</span></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm rounded-pill px-3">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="welcome-banner">
        <h4 class="fw-bold mb-1"><i class="bi bi-stars me-2"></i>Welcome back, <span th:text="${user.name}">User</span>!</h4>
        <p class="mb-0 opacity-75">Browse books below and borrow what you like.</p>
    </div>

    <h5 class="section-title mb-3"><i class="bi bi-journal-bookmark me-2"></i>Available Books</h5>
    <div class="row g-3 mb-5">
        <div class="col-md-4" th:each="book : ${books}">
            <div class="card book-card p-3">
                <div class="d-flex align-items-start gap-3">
                    <div class="book-icon flex-shrink-0">
                        <i class="bi bi-book text-white fs-5"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h6 class="fw-bold mb-1" th:text="${book.title}"></h6>
                        <p class="text-muted small mb-1"><i class="bi bi-person me-1"></i><span th:text="${book.author}"></span></p>
                        <p class="text-muted small mb-2"><i class="bi bi-upc me-1"></i><span th:text="${book.isbn}"></span></p>
                        <div class="d-flex align-items-center justify-content-between">
                            <span class="small">
                                <span th:class="${book.availableCopies > 0} ? 'badge-returned' : 'badge-borrowed'"
                                      th:text="${book.availableCopies} + ' available'"></span>
                            </span>
                            <a th:if="${book.availableCopies > 0}"
                               th:href="@{/member/borrow/{id}(id=${book.id})}"
                               class="btn btn-sm rounded-pill px-3 text-white fw-semibold"
                               style="background: linear-gradient(135deg, #667eea, #764ba2); border:none;">
                                <i class="bi bi-bookmark-plus me-1"></i>Borrow
                            </a>
                            <span th:if="${book.availableCopies == 0}" class="text-muted small fst-italic">Unavailable</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h5 class="section-title mb-3"><i class="bi bi-clock-history me-2"></i>My Borrow History</h5>
            <div class="table-responsive">
                <table class="table table-hover rounded-3 overflow-hidden">
                    <thead>
                    <tr><th>Book</th><th>Borrow Date</th><th>Return Date</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="record : ${history}">
                        <td class="fw-semibold" th:text="${record.book.title}"></td>
                        <td th:text="${record.borrowDate}"></td>
                        <td th:text="${record.returnDate != null ? record.returnDate : '-'}"></td>
                        <td>
                                <span th:class="${record.status == 'BORROWED'} ? 'badge-borrowed' : 'badge-returned'"
                                      th:text="${record.status}"></span>
                        </td>
                        <td>
                            <a th:if="${record.status == 'BORROWED'}"
                               th:href="@{/member/return/{id}(id=${record.id})}"
                               class="btn btn-warning btn-sm rounded-pill px-3 fw-semibold">
                                <i class="bi bi-arrow-return-left me-1"></i>Return
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
