<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card-header { background: linear-gradient(135deg, #11998e, #38ef7d); border-radius: 20px 20px 0 0 !important; padding: 2rem; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); border: none; border-radius: 10px; padding: 12px; font-size: 16px; color: white; }
        .btn-success:hover { transform: translateY(-1px); }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 2px solid #e9ecef; }
        .form-control:focus, .form-select:focus { border-color: #11998e; box-shadow: 0 0 0 0.2rem rgba(17,153,142,0.25); }
        .text-danger { font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header text-center text-white">
                    <i class="bi bi-person-plus-fill" style="font-size: 3rem;"></i>
                    <h3 class="mt-2 mb-0 fw-bold">Create Account</h3>
                    <p class="mb-0 opacity-75">Join the library system</p>
                </div>
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger rounded-3" th:text="${error}"></div>
                    <form th:action="@{/register}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="John Doe"/>
                            </div>
                            <span class="text-danger" th:errors="*{name}"></span>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com"/>
                            </div>
                            <span class="text-danger" th:errors="*{email}"></span>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••"/>
                            </div>
                            <span class="text-danger" th:errors="*{password}"></span>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Role</label>
                            <select th:field="*{role}" class="form-select">
                                <option value="MEMBER">Member</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-semibold">
                            <i class="bi bi-person-check me-2"></i>Create Account
                        </button>
                    </form>
                    <hr class="my-4"/>
                    <p class="text-center mb-0 text-muted">Already have an account?
                        <a href="/login" class="text-decoration-none fw-semibold" style="color:#11998e;">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
