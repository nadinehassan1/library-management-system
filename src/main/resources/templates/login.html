<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card-header { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px 20px 0 0 !important; padding: 2rem; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; padding: 12px; font-size: 16px; }
        .btn-primary:hover { background: linear-gradient(135deg, #764ba2, #667eea); transform: translateY(-1px); }
        .form-control { border-radius: 10px; padding: 12px; border: 2px solid #e9ecef; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header text-center text-white">
                    <i class="bi bi-book-half" style="font-size: 3rem;"></i>
                    <h3 class="mt-2 mb-0 fw-bold">Library System</h3>
                    <p class="mb-0 opacity-75">Sign in to your account</p>
                </div>
                <div class="card-body p-4">
                    <div th:if="${param.error}" class="alert alert-danger rounded-3">
                        <i class="bi bi-exclamation-circle me-2"></i>Invalid email or password.
                    </div>
                    <div th:if="${param.registered}" class="alert alert-success rounded-3">
                        <i class="bi bi-check-circle me-2"></i>Registered successfully! Please log in.
                    </div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="username" class="form-control" placeholder="you@example.com" required/>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>
                    <hr class="my-4"/>
                    <p class="text-center mb-0 text-muted">Don't have an account?
                        <a href="/register" class="text-decoration-none fw-semibold" style="color:#667eea;">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
